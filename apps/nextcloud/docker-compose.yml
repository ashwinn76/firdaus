services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./db:/var/lib/postgresql

  redis:
    image: redis:alpine
    restart: unless-stopped

  nextcloud:
    image: nextcloud:32-apache
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "30027:80"
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: redis
    volumes:
      - ./html:/var/www/html
      - /mnt/nas/nextcloud/data:/var/www/html/data

